<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#14233B" flood-opacity=".11"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#14233B"/></marker>
    <style>text{font-family:'Microsoft YaHei','Noto Sans SC',Arial,sans-serif;letter-spacing:0}.title{font-size:42px;font-weight:800;fill:#14233B}.sub{font-size:18px;fill:#76808D}.h{font-size:24px;font-weight:800;fill:#1C2635}.b{font-size:17px;fill:#1C2635}.s{font-size:14px;fill:#76808D}.num{font-size:34px;font-weight:900}.white{fill:#fff}.bold{font-weight:800}</style>
  </defs>
<text x="70" y="72" class="s" fill="#EF6634" font-weight="800">LOCAL NETWORK DEPLOYMENT</text>
  <text x="70" y="125" class="title">断开 USB 后仍可运行的局域网拓扑</text>
  <text x="70" y="160" class="sub">USB 只负责首次烧录与调试；日常运行依靠独立供电和同一局域网</text>
  <path d="M70 190H1530" stroke="#DED8CE" stroke-width="2"/>
<g transform="translate(800 515)"><rect x="-165" y="-105" width="330" height="210" rx="80" fill="#14233B" filter="url(#shadow)"/><path d="M-76 5Q0-68 76 5M-46 32Q0-12 46 32" stroke="#EAB83F" stroke-width="12" fill="none" stroke-linecap="round"/><circle cy="56" r="10" fill="#EAB83F"/><text y="-55" text-anchor="middle" class="white h">同一局域网</text><text y="93" text-anchor="middle" class="s" fill="#C0CAD5">Wi-Fi / 手机热点 / 路由器</text></g>
<rect x="70" y="280" width="390" height="290" rx="8" fill="#FFFDF9" stroke="#DED8CE" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="280" width="8" height="290" rx="4" fill="#3277C7"/><g transform="translate(165 395) scale(0.65)"><rect x="-65" y="-48" width="130" height="88" rx="8" fill="#FFFDF9" stroke="#3277C7" stroke-width="5"/><path d="M-25 62H25M0 40V62" stroke="#3277C7" stroke-width="6"/><path d="M-45-20H40M-45 0H20M-45 20H35" stroke="#3277C7" stroke-width="5" stroke-linecap="round"/></g><text x="245" y="340" class="h">电脑本地服务</text><text x="245" y="382" class="b">10.143.97.5</text><text x="245" y="418" class="s">家长端 · 视觉分析 · TTS</text><text x="110" y="510" class="s">监听端口</text><rect x="200" y="485" width="220" height="38" rx="19" fill="#3277C7" opacity=".13"/><text x="310" y="510" text-anchor="middle" class="s" fill="#3277C7" font-weight="800">8000 · 1883 · 18000+</text>
<rect x="1140" y="280" width="390" height="290" rx="8" fill="#FFFDF9" stroke="#DED8CE" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1140" y="280" width="8" height="290" rx="4" fill="#2F8B68"/><g transform="translate(1230 395) scale(0.68)"><rect x="-58" y="-43" width="116" height="86" rx="25" fill="#FFFDF9" stroke="#2F8B68" stroke-width="5"/><circle cx="-23" cy="-3" r="8" fill="#EAB83F"/><circle cx="23" cy="-3" r="8" fill="#EAB83F"/><path d="M-24 22Q0 38 24 22" stroke="#2F8B68" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M0-43V-65" stroke="#2F8B68" stroke-width="5"/><circle cy="-72" r="8" fill="#EF6634"/></g><text x="1310" y="340" class="h">小智机器人</text><text x="1310" y="382" class="b">MAC 90:70:69:0e:a4:ac</text><text x="1310" y="418" class="s">独立供电 · Wi-Fi 在线</text><text x="1180" y="510" class="s">通信方式</text><rect x="1270" y="485" width="220" height="38" rx="19" fill="#2F8B68" opacity=".13"/><text x="1380" y="510" text-anchor="middle" class="s" fill="#2F8B68" font-weight="800">MQTT + UDP/TTS</text>
<path d="M460 425L625 475" stroke="#3277C7" stroke-width="4" fill="none" marker-end="url(#arrow)" /><path d="M975 475L1140 425" stroke="#2F8B68" stroke-width="4" fill="none" marker-end="url(#arrow)" />
<g transform="translate(800 735)"><rect x="-530" y="-72" width="1060" height="144" rx="8" fill="#FFFDF9" stroke="#DED8CE" stroke-width="2"/><circle cx="-465" r="28" fill="#EF6634" opacity=".14"/><path d="M-477-12L-453 12M-453-12L-477 12" stroke="#EF6634" stroke-width="7"/><text x="-415" y="-15" class="h">运行时 USB 不需要</text><text x="-415" y="25" class="s">若电脑 DHCP 地址变化，固件仍指向旧 IP，就会出现“检查新版本失败”。</text><text x="180" y="-15" class="b bold" fill="#2F8B68">稳定方案</text><text x="180" y="25" class="s">路由器 DHCP 地址保留 / 固定热点 / 后续 mDNS 自动发现</text></g>
