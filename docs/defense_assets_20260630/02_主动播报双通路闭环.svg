<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#14233B" flood-opacity=".11"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#14233B"/></marker>
    <style>text{font-family:'Microsoft YaHei','Noto Sans SC',Arial,sans-serif;letter-spacing:0}.title{font-size:42px;font-weight:800;fill:#14233B}.sub{font-size:18px;fill:#76808D}.h{font-size:24px;font-weight:800;fill:#1C2635}.b{font-size:17px;fill:#1C2635}.s{font-size:14px;fill:#76808D}.num{font-size:34px;font-weight:900}.white{fill:#fff}.bold{font-weight:800}</style>
  </defs>
<text x="70" y="72" class="s" fill="#EF6634" font-weight="800">DUAL-CHANNEL ACTIVE SPEECH</text>
  <text x="70" y="125" class="title">两条提醒通路，一个主动播报闭环</text>
  <text x="70" y="160" class="sub">家长主动关怀与视觉自动干预共享同一可靠语音下行能力</text>
  <path d="M70 190H1530" stroke="#DED8CE" stroke-width="2"/>
<path d="M320 320C600 210 1000 210 1280 320" stroke="#EF6634" stroke-width="14" fill="none" stroke-linecap="round"/>
<path d="M320 650C600 760 1000 760 1280 650" stroke="#3277C7" stroke-width="14" fill="none" stroke-linecap="round"/>
<rect x="70" y="260" width="360" height="190" rx="8" fill="#FFFDF9" stroke="#DED8CE" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="260" width="8" height="190" rx="4" fill="#EF6634"/><text x="110" y="315" class="s" fill="#EF6634" font-weight="800">通路 A · 人工关怀</text><text x="110" y="360" class="h">家长端留言</text><text x="110" y="398" class="b">点击发送后立即进入播报队列</text><rect x="110" y="420" width="160" height="38" rx="19" fill="#EF6634" opacity=".13"/><text x="190" y="445" text-anchor="middle" class="s" fill="#EF6634" font-weight="800">主动触发</text>
<rect x="70" y="550" width="360" height="190" rx="8" fill="#FFFDF9" stroke="#DED8CE" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="550" width="8" height="190" rx="4" fill="#3277C7"/><text x="110" y="605" class="s" fill="#3277C7" font-weight="800">通路 B · 自动干预</text><text x="110" y="650" class="h">视觉检测分心</text><text x="110" y="688" class="b">连续低分达到学段阈值后触发</text><rect x="110" y="710" width="160" height="38" rx="19" fill="#3277C7" opacity=".13"/><text x="190" y="735" text-anchor="middle" class="s" fill="#3277C7" font-weight="800">策略触发</text>
<g transform="translate(800 490)"><circle r="176" fill="#14233B" filter="url(#shadow)"/><circle r="128" fill="none" stroke="#EAB83F" stroke-width="3" stroke-dasharray="7 8"/><g transform="translate(0 -25) scale(1.05)"><rect x="-58" y="-43" width="116" height="86" rx="25" fill="#FFFDF9" stroke="#FFFDF9" stroke-width="5"/><circle cx="-23" cy="-3" r="8" fill="#EAB83F"/><circle cx="23" cy="-3" r="8" fill="#EAB83F"/><path d="M-24 22Q0 38 24 22" stroke="#FFFDF9" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M0-43V-65" stroke="#FFFDF9" stroke-width="5"/><circle cy="-72" r="8" fill="#EF6634"/></g><text x="0" y="85" class="white h" text-anchor="middle">主动播报引擎</text><text x="0" y="115" class="s" fill="#B7C2D0" text-anchor="middle">提醒编排 · TTS · 状态回执</text></g>
<rect x="1170" y="325" width="360" height="330" rx="8" fill="#FFFDF9" stroke="#DED8CE" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1170" y="325" width="8" height="330" rx="4" fill="#2F8B68"/><text x="1210" y="382" class="s" fill="#2F8B68" font-weight="800">ROBOT OUTPUT</text><text x="1210" y="430" class="h">小智立即开口提醒</text><path d="M1210 470H1480" stroke="#DED8CE" stroke-width="2"/>
<text x="1210" y="515" class="b">① MQTT 唤醒设备下行</text><text x="1210" y="555" class="b">② UDP 推送合成音频</text><text x="1210" y="595" class="b">③ spoken 状态闭环回执</text><rect x="1210" y="620" width="235" height="38" rx="19" fill="#2F8B68" opacity=".13"/><text x="1327.5" y="645" text-anchor="middle" class="s" fill="#2F8B68" font-weight="800">无需触碰机器人按键</text>
<path d="M430 355L625 415" stroke="#EF6634" stroke-width="4" fill="none" marker-end="url(#arrow)" /><path d="M430 645L625 565" stroke="#3277C7" stroke-width="4" fill="none" marker-end="url(#arrow)" /><path d="M975 490L1170 490" stroke="#2F8B68" stroke-width="4" fill="none" marker-end="url(#arrow)" />
</svg>
